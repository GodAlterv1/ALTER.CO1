# Run API smoke tests against your live site — no local Node required.
# GitHub repo → Actions → "Smoke test (production)" → Run workflow

name: Smoke test (production)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Base URL (no trailing slash)"
        required: true
        default: "https://alter-co.onrender.com"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci --prefix backend

      - name: Run smoke suite
        env:
          SMOKE_BASE_URL: ${{ github.event.inputs.url }}
        run: npm run smoke
